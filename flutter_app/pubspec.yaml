name: kita_english
description: Kita English - Fun English learning app for Vietnamese kids
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.0.1

  # Networking
  dio: ^5.4.0

  # Path provider (for temp files)
  path_provider: ^2.1.2

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Audio recording
  record: ^6.0.0

  # Audio playback
  just_audio: ^0.9.36

  # Animations
  lottie: ^3.0.0
  flutter_animate: ^4.3.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Sharing
  share_plus: ^7.2.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/

  # fonts:
  #   - family: NunitoSans
  #     fonts:
  #       - asset: assets/fonts/NunitoSans-Regular.ttf
  #       - asset: assets/fonts/NunitoSans-Bold.ttf
