<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kita_english">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>kita_english</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Unregister old service workers to ensure fresh deploys load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // Web microphone recording via MediaRecorder API
    var _kitaMediaRecorder = null;
    var _kitaAudioChunks = [];
    var _kitaRecordingResolve = null;

    function _kitaStartRecording() {
      return new Promise(function(resolve, reject) {
        navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1 } })
          .then(function(stream) {
            _kitaAudioChunks = [];
            // Pick the first supported MIME type (Safari needs mp4, Chrome prefers webm)
            var mimeType = '';
            var candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
            for (var i = 0; i < candidates.length; i++) {
              if (MediaRecorder.isTypeSupported(candidates[i])) {
                mimeType = candidates[i];
                break;
              }
            }
            var recorderOptions = mimeType ? { mimeType: mimeType } : {};
            _kitaMediaRecorder = new MediaRecorder(stream, recorderOptions);
            _kitaMediaRecorder.ondataavailable = function(e) {
              if (e.data.size > 0) _kitaAudioChunks.push(e.data);
            };
            _kitaMediaRecorder.onstop = function() {
              var blobType = mimeType || 'audio/webm';
              var blob = new Blob(_kitaAudioChunks, { type: blobType });
              stream.getTracks().forEach(function(t) { t.stop(); });
              // Convert to 16kHz mono WAV (required by Azure Speech API)
              _kitaToWavBase64(blob).then(function(wavBase64) {
                if (_kitaRecordingResolve) {
                  _kitaRecordingResolve(wavBase64);
                  _kitaRecordingResolve = null;
                }
              });
            };
            _kitaMediaRecorder.start();
            resolve(true);
          })
          .catch(function(err) {
            console.warn('Mic access denied:', err);
            reject(err);
          });
      });
    }

    function _kitaStopRecording() {
      return new Promise(function(resolve) {
        _kitaRecordingResolve = resolve;
        if (_kitaMediaRecorder && _kitaMediaRecorder.state === 'recording') {
          _kitaMediaRecorder.stop();
        } else {
          resolve(null);
        }
      });
    }

    // --- WAV helpers for Azure Speech API compatibility ---
    // Azure REST pronunciation assessment requires PCM WAV (16kHz mono 16-bit).
    // MediaRecorder outputs WebM/Opus which Azure rejects.
    // We decode via AudioContext then re-encode as WAV.

    function _kitaEncodeWAV(samples, sampleRate) {
      var buf = new ArrayBuffer(44 + samples.length * 2);
      var view = new DataView(buf);
      function ws(offset, str) {
        for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
      }
      ws(0, 'RIFF');
      view.setUint32(4, 36 + samples.length * 2, true);
      ws(8, 'WAVE');
      ws(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);   // PCM
      view.setUint16(22, 1, true);   // mono
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      ws(36, 'data');
      view.setUint32(40, samples.length * 2, true);
      var offset = 44;
      for (var i = 0; i < samples.length; i++) {
        var s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        offset += 2;
      }
      return buf;
    }

    // Convert any audio blob to 16kHz mono PCM WAV, return as base64.
    function _kitaToWavBase64(blob) {
      return new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onloadend = function() {
          var arrayBuffer = reader.result;
          var targetRate = 16000;
          var ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: targetRate });
          ctx.decodeAudioData(arrayBuffer, function(audioBuffer) {
            // Mix to mono: average all channels
            var numChannels = audioBuffer.numberOfChannels;
            var len = audioBuffer.length;
            var mono = new Float32Array(len);
            for (var c = 0; c < numChannels; c++) {
              var ch = audioBuffer.getChannelData(c);
              for (var i = 0; i < len; i++) mono[i] += ch[i] / numChannels;
            }
            var wavBuf = _kitaEncodeWAV(mono, targetRate);
            var bytes = new Uint8Array(wavBuf);
            var binary = '';
            for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            ctx.close();
            resolve(btoa(binary));
          }, function(err) {
            console.warn('decodeAudioData failed, falling back to raw base64:', err);
            // Fall back to raw bytes if decode fails
            var r2 = new FileReader();
            r2.onloadend = function() { resolve(r2.result.split(',')[1]); };
            r2.readAsDataURL(blob);
          });
        };
        reader.readAsArrayBuffer(blob);
      });
    }

    function _kitaIsRecording() {
      return _kitaMediaRecorder && _kitaMediaRecorder.state === 'recording';
    }

    // Web Audio API tone generator for sound effects
    var _kitaAudioCtx = null;
    function _kitaPlayTone(frequency, duration, type) {
      try {
        if (!_kitaAudioCtx) _kitaAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = _kitaAudioCtx.createOscillator();
        var gain = _kitaAudioCtx.createGain();
        osc.type = type;
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(0.3, _kitaAudioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, _kitaAudioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(_kitaAudioCtx.destination);
        osc.start(_kitaAudioCtx.currentTime);
        osc.stop(_kitaAudioCtx.currentTime + duration);
      } catch(e) { console.warn('Audio:', e); }
    }
    // ElevenLabs TTS audio playback
    function _kitaPlayAudio(url) {
      return new Promise(function(resolve, reject) {
        var audio = new Audio(url);
        audio.onended = function() { resolve(null); };
        audio.onerror = function(e) { reject(e); };
        audio.play().catch(reject);
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
