<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kita_english">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>kita_english</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Unregister old service workers to ensure fresh deploys load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // Web microphone recording via MediaRecorder API
    var _kitaMediaRecorder = null;
    var _kitaAudioChunks = [];
    var _kitaRecordingResolve = null;

    function _kitaStartRecording() {
      return new Promise(function(resolve, reject) {
        navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } })
          .then(function(stream) {
            _kitaAudioChunks = [];
            _kitaMediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
            _kitaMediaRecorder.ondataavailable = function(e) {
              if (e.data.size > 0) _kitaAudioChunks.push(e.data);
            };
            _kitaMediaRecorder.onstop = function() {
              var blob = new Blob(_kitaAudioChunks, { type: 'audio/webm' });
              stream.getTracks().forEach(function(t) { t.stop(); });
              // Convert to base64 for Dart
              var reader = new FileReader();
              reader.onloadend = function() {
                var base64 = reader.result.split(',')[1];
                if (_kitaRecordingResolve) {
                  _kitaRecordingResolve(base64);
                  _kitaRecordingResolve = null;
                }
              };
              reader.readAsDataURL(blob);
            };
            _kitaMediaRecorder.start();
            resolve(true);
          })
          .catch(function(err) {
            console.warn('Mic access denied:', err);
            reject(err);
          });
      });
    }

    function _kitaStopRecording() {
      return new Promise(function(resolve) {
        _kitaRecordingResolve = resolve;
        if (_kitaMediaRecorder && _kitaMediaRecorder.state === 'recording') {
          _kitaMediaRecorder.stop();
        } else {
          resolve(null);
        }
      });
    }

    function _kitaIsRecording() {
      return _kitaMediaRecorder && _kitaMediaRecorder.state === 'recording';
    }

    // Web Audio API tone generator for sound effects
    var _kitaAudioCtx = null;
    function _kitaPlayTone(frequency, duration, type) {
      try {
        if (!_kitaAudioCtx) _kitaAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = _kitaAudioCtx.createOscillator();
        var gain = _kitaAudioCtx.createGain();
        osc.type = type;
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(0.3, _kitaAudioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, _kitaAudioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(_kitaAudioCtx.destination);
        osc.start(_kitaAudioCtx.currentTime);
        osc.stop(_kitaAudioCtx.currentTime + duration);
      } catch(e) { console.warn('Audio:', e); }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
